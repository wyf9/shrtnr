name: Release SDK (reusable)

# Reusable workflow that powers every SDK release track.
#
# Callers pass the SDK-specific bits as inputs and the workflow handles:
#   1. Reading the version from the manifest.
#   2. Skipping idempotently when the version is unchanged or the tag
#      already exists on origin.
#   3. Extracting the matching CHANGELOG section.
#   4. Running the registry-specific build + publish path (npm, PyPI,
#      pub.dev) via OIDC trusted publishing — no long-lived tokens.
#   5. Creating and pushing the tag (main-push mode only) and a GitHub
#      Release with the changelog as the body.
#
# pub.dev is the one registry that cannot run in "main-push" mode because
# its trusted-publishing config requires the OIDC token to carry the
# tag's ref. Callers that publish to pub.dev run the workflow in
# "tag-push" mode instead, with the developer pushing the tag manually.

on:
  workflow_call:
    inputs:
      sdk_path:
        description: SDK working directory, e.g. sdk/typescript
        required: true
        type: string
      manifest_file:
        description: Manifest file to read the version from (package.json, pyproject.toml, pubspec.yaml)
        required: true
        type: string
      tag_prefix:
        description: Tag prefix, e.g. npm-v, py-v, pub-v
        required: true
        type: string
      registry:
        description: Target registry (npm | pypi | pub.dev)
        required: true
        type: string
      changelog_file:
        description: CHANGELOG file to extract release notes from
        required: true
        type: string
      mode:
        description: main-push (auto-tag after publish) or tag-push (tag triggered the caller)
        required: false
        type: string
        default: main-push

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-sdk-${{ inputs.sdk_path }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ inputs.mode }}" = "tag-push" ]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#${{ inputs.tag_prefix }}}"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
              echo "tag $TAG does not match expected ${{ inputs.tag_prefix }}<version> pattern" >&2
              exit 1
            fi
            MANIFEST_VERSION=$(bash scripts/read-version.sh "${{ inputs.manifest_file }}")
            if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
              echo "tag version $VERSION does not match manifest version $MANIFEST_VERSION" >&2
              exit 1
            fi
            echo "current=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(bash scripts/read-version.sh "${{ inputs.manifest_file }}")
            TAG="${{ inputs.tag_prefix }}$CURRENT"
            # Skip when the manifest wasn't touched in the triggering push.
            PREV=""
            if git show HEAD~1:"${{ inputs.manifest_file }}" >/tmp/prev-manifest 2>/dev/null; then
              PREV=$(bash scripts/read-version.sh /tmp/prev-manifest 2>/dev/null || echo "")
            fi
            if [ "$PREV" = "$CURRENT" ]; then
              echo "version unchanged ($CURRENT); skipping release" >&2
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            elif git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "tag $TAG already exists on origin; skipping" >&2
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            fi
            echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for version
        if: steps.version.outputs.should_run == 'true'
        run: |
          bash scripts/extract-changelog.sh \
            "${{ steps.version.outputs.current }}" \
            "${{ inputs.changelog_file }}" \
            /tmp/release-notes.md

      # ---- npm ----

      - uses: actions/setup-node@v6
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'npm'
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'npm'
        run: npm install -g --force npm@latest

      - name: npm install + build + test
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'npm'
        working-directory: ${{ inputs.sdk_path }}
        run: |
          yarn install --frozen-lockfile
          yarn build
          yarn test

      - name: npm publish
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'npm'
        working-directory: ${{ inputs.sdk_path }}
        run: npm publish --access public

      # ---- pypi ----

      - uses: actions/setup-python@v5
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'pypi'
        with:
          python-version: '3.12'

      - name: pip install + test + build
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'pypi'
        working-directory: ${{ inputs.sdk_path }}
        run: |
          python -m pip install --upgrade pip build
          pip install -e '.[dev]'
          pytest
          python -m build

      - name: pypi publish via trusted publisher
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.sdk_path }}/dist

      # ---- pub.dev ----

      - uses: dart-lang/setup-dart@v1
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'pub.dev'

      - name: dart pub get + analyze + test
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'pub.dev'
        working-directory: ${{ inputs.sdk_path }}
        run: |
          dart pub get
          dart analyze --fatal-infos
          dart test

      - name: Publish to pub.dev
        if: steps.version.outputs.should_run == 'true' && inputs.registry == 'pub.dev'
        working-directory: ${{ inputs.sdk_path }}
        run: dart pub publish --force

      # ---- tag + github release ----

      - name: Create and push tag (main-push mode)
        if: steps.version.outputs.should_run == 'true' && inputs.mode == 'main-push'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.version.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
