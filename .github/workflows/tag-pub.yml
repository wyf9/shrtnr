name: Tag pub.dev SDK

# Creates the pub-v<version> tag when sdk/dart/pubspec.yaml is bumped beyond
# the latest existing tag. The tag push triggers release-pub.yml, which must
# be tag-triggered because pub.dev OIDC requires refType=tag.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag if missing
        run: |
          VERSION=$(grep '^version:' sdk/dart/pubspec.yaml | head -n1 | awk '{print $2}' | tr -d '"')
          if [ -z "$VERSION" ]; then
            echo "Could not read version from sdk/dart/pubspec.yaml" >&2
            exit 1
          fi
          TAG="pub-v$VERSION"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, nothing to do"
            exit 0
          fi
          echo "Creating tag $TAG"
          git tag "$TAG"
          git push origin "$TAG"
