name: Release npm SDK

on:
  push:
    branches: [main]
    paths:
      - sdk/typescript/package.json

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        run: |
          CURRENT=$(jq -r .version sdk/typescript/package.json)
          PREVIOUS=$(git show HEAD~1:sdk/typescript/package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$CURRENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag does not exist
        if: steps.version.outputs.changed == 'true'
        id: check_tag
        run: |
          TAG="npm-v${{ steps.version.outputs.current }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for version
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          bash scripts/extract-changelog.sh \
            "${{ steps.version.outputs.current }}" \
            sdk/typescript/CHANGELOG.md \
            /tmp/npm-release-notes.md

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        working-directory: sdk/typescript
        run: yarn install --frozen-lockfile

      - name: Build
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        working-directory: sdk/typescript
        run: yarn build

      - name: Test
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        working-directory: sdk/typescript
        run: yarn test

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: npm publish --access public

      - name: Create tag and release
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="npm-v${{ steps.version.outputs.current }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/npm-release-notes.md
