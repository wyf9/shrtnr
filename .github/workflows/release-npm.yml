name: Release npm SDK

on:
  push:
    branches: [main]
    paths:
      - sdk/typescript/package.json
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: version
        run: |
          CURRENT=$(jq -r .version sdk/typescript/package.json)
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "null" ]; then
            echo "Could not read version from sdk/typescript/package.json" >&2
            exit 1
          fi
          TAG="npm-v$CURRENT"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for version
        if: steps.version.outputs.exists == 'false'
        run: |
          bash scripts/extract-changelog.sh \
            "${{ steps.version.outputs.current }}" \
            sdk/typescript/CHANGELOG.md \
            /tmp/npm-release-notes.md

      - uses: actions/setup-node@v6
        if: steps.version.outputs.exists == 'false'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.version.outputs.exists == 'false'
        working-directory: sdk/typescript
        run: yarn install --frozen-lockfile

      - name: Build
        if: steps.version.outputs.exists == 'false'
        working-directory: sdk/typescript
        run: yarn build

      - name: Test
        if: steps.version.outputs.exists == 'false'
        working-directory: sdk/typescript
        run: yarn test

      - name: Publish to npm
        if: steps.version.outputs.exists == 'false'
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: npm publish --access public

      - name: Create tag and release
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/npm-release-notes.md
