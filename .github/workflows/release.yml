name: Release

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$CURRENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag does not exist
        if: steps.version.outputs.changed == 'true'
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for version
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          # Extract the section for this version from CHANGELOG.md.
          # Matches from "## [x.y.z]" or "## x.y.z" until the next "## " heading.
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## / {
              if (found) exit
              if (index($0, ver)) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi

          # Write to file to preserve newlines
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create tag and release
        if: steps.version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release_notes.md
