name: Release Python SDK

# Thin caller over release-sdk.yml. Triggered on any push to main that
# touches sdk/python/** (or this workflow / the reusable one / helper
# scripts), but the reusable workflow only publishes when the version
# string in sdk/python/pyproject.toml actually changed in the push
# range — a changelog-only or test-only edit runs the workflow and
# exits cleanly without publishing. Uses PyPI trusted publishing
# (OIDC, no token). The PyPI project needs a one-time configuration
# pointing at this workflow — see docs/release-automation.md.

on:
  push:
    branches: [main]
    paths:
      - 'sdk/python/**'
      - '.github/workflows/release-sdk.yml'
      - '.github/workflows/release-sdk-python.yml'
      - 'scripts/extract-changelog.sh'
      - 'scripts/read-version.sh'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: ./.github/workflows/release-sdk.yml
    with:
      sdk_path: sdk/python
      manifest_file: sdk/python/pyproject.toml
      tag_prefix: py-v
      registry: pypi
      changelog_file: sdk/python/CHANGELOG.md
      mode: main-push
